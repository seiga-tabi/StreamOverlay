services:
  server:
    environment:
      NODE_ENV: production
      STREAMOPS_LOCAL_NO_AUTH: "false"
      TRUST_PROXY: ${PRODUCTION_TRUST_PROXY:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      DASHBOARD_BASE_URL: ${DASHBOARD_BASE_URL:?DASHBOARD_BASE_URL is required}
      OVERLAY_BASE_URL: ${OVERLAY_BASE_URL:?OVERLAY_BASE_URL is required}
      TWITCH_REDIRECT_URI: ${TWITCH_REDIRECT_URI:?TWITCH_REDIRECT_URI is required}
      TWITCH_PUBLIC_REDIRECT_URI: ${TWITCH_PUBLIC_REDIRECT_URI:?TWITCH_PUBLIC_REDIRECT_URI is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      DASHBOARD_AUTH_TOKEN: ${DASHBOARD_AUTH_TOKEN:-}
      DASHBOARD_AUTH_TOKEN_FILE: ${DASHBOARD_AUTH_TOKEN_FILE:-}
      OVERLAY_ACCESS_TOKEN: ${OVERLAY_ACCESS_TOKEN:-}
      OVERLAY_ACCESS_TOKEN_FILE: ${OVERLAY_ACCESS_TOKEN_FILE:-}
      BRIDGE_SHARED_SECRET: ${BRIDGE_SHARED_SECRET:-}
      BRIDGE_SHARED_SECRET_FILE: ${BRIDGE_SHARED_SECRET_FILE:-}
      SUPPORT_MAILBOX_ENABLED: ${SUPPORT_MAILBOX_ENABLED:-false}
      SUPPORT_MAILBOX_ADDRESS: ${SUPPORT_MAILBOX_ADDRESS:-support@yoro.gg}
      SUPPORT_MAILBOX_WEBHOOK_SECRET: ${SUPPORT_MAILBOX_WEBHOOK_SECRET:-}
      SUPPORT_MAILBOX_WEBHOOK_SECRET_FILE: ${SUPPORT_MAILBOX_WEBHOOK_SECRET_FILE:-}
      SUPPORT_MAILBOX_ENCRYPTION_KEY: ${SUPPORT_MAILBOX_ENCRYPTION_KEY:-}
      SUPPORT_MAILBOX_ENCRYPTION_KEY_FILE: ${SUPPORT_MAILBOX_ENCRYPTION_KEY_FILE:-}
      LEGAL_OPERATOR_NAME: ${LEGAL_OPERATOR_NAME:?LEGAL_OPERATOR_NAME is required}
      LEGAL_CONTACT_ADDRESS: ${LEGAL_CONTACT_ADDRESS:?LEGAL_CONTACT_ADDRESS is required}
      LEGAL_PRIVACY_OFFICER_NAME: ${LEGAL_PRIVACY_OFFICER_NAME:?LEGAL_PRIVACY_OFFICER_NAME is required}
      LEGAL_CONTACT_EMAIL: ${LEGAL_CONTACT_EMAIL:?LEGAL_CONTACT_EMAIL is required}
      LEGAL_EFFECTIVE_DATE: ${LEGAL_EFFECTIVE_DATE:?LEGAL_EFFECTIVE_DATE is required}
      LEGAL_GOVERNING_LAW_KO: ${LEGAL_GOVERNING_LAW_KO:?LEGAL_GOVERNING_LAW_KO is required}
      LEGAL_GOVERNING_LAW_JA: ${LEGAL_GOVERNING_LAW_JA:?LEGAL_GOVERNING_LAW_JA is required}
      LEGAL_DISPUTE_VENUE_KO: ${LEGAL_DISPUTE_VENUE_KO:?LEGAL_DISPUTE_VENUE_KO is required}
      LEGAL_DISPUTE_VENUE_JA: ${LEGAL_DISPUTE_VENUE_JA:?LEGAL_DISPUTE_VENUE_JA is required}
      LEGAL_PROCESSORS_KO: ${LEGAL_PROCESSORS_KO:?LEGAL_PROCESSORS_KO is required}
      LEGAL_PROCESSORS_JA: ${LEGAL_PROCESSORS_JA:?LEGAL_PROCESSORS_JA is required}
      LEGAL_CROSS_BORDER_TRANSFER_KO: ${LEGAL_CROSS_BORDER_TRANSFER_KO:?LEGAL_CROSS_BORDER_TRANSFER_KO is required}
      LEGAL_CROSS_BORDER_TRANSFER_JA: ${LEGAL_CROSS_BORDER_TRANSFER_JA:?LEGAL_CROSS_BORDER_TRANSFER_JA is required}

  tts-engine:
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
