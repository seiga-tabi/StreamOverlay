services:
  server:
    image: ${YORO_SERVER_IMAGE:-streamops-server:local}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: streamops-server
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      STREAMOPS_LOCAL_NO_AUTH: ${STREAMOPS_LOCAL_NO_AUTH:-false}
      PORT: ${PORT:-3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      DASHBOARD_BASE_URL: ${DASHBOARD_BASE_URL:-http://localhost:3000}
      OVERLAY_BASE_URL: ${OVERLAY_BASE_URL:-http://localhost:3000/overlay}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      ALLOW_INSECURE_DEV: ${ALLOW_INSECURE_DEV:-false}
      ALLOW_LEGACY_WS_QUERY_AUTH: ${ALLOW_LEGACY_WS_QUERY_AUTH:-false}
      TWITCH_ENABLE_EVENTSUB: ${TWITCH_ENABLE_EVENTSUB:-false}
      TWITCH_EVENTSUB_SUBSCRIPTIONS: ${TWITCH_EVENTSUB_SUBSCRIPTIONS:-stream.online stream.offline channel.chat.message channel.channel_points_custom_reward_redemption.add}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      TWITCH_REDIRECT_URI: ${TWITCH_REDIRECT_URI:-http://localhost:3000/api/twitch/auth/callback}
      TWITCH_PUBLIC_REDIRECT_URI: ${TWITCH_PUBLIC_REDIRECT_URI:-http://localhost:3000/api/public/twitch/auth/callback}
      TWITCH_EXTRA_SCOPES: ${TWITCH_EXTRA_SCOPES:-}
      TWITCH_TOKEN_STORE_PATH: ${TWITCH_TOKEN_STORE_PATH:-/app/.streamops/twitch-token.json}
      TWITCH_USER_ACCESS_TOKEN: ${TWITCH_USER_ACCESS_TOKEN:-}
      TWITCH_BROADCASTER_ID: ${TWITCH_BROADCASTER_ID:-}
      TWITCH_BOT_USER_ID: ${TWITCH_BOT_USER_ID:-}
      TWITCH_CHAT_SENDER_ID: ${TWITCH_CHAT_SENDER_ID:-}
      TWITCH_CHAT_MODE: ${TWITCH_CHAT_MODE:-broadcaster}
      TWITCH_CHAT_THROTTLE_MS: ${TWITCH_CHAT_THROTTLE_MS:-1500}
      TWITCH_CHAT_COOLDOWN_MS: ${TWITCH_CHAT_COOLDOWN_MS:-10000}
      TWITCH_CHAT_MAX_QUEUE: ${TWITCH_CHAT_MAX_QUEUE:-20}
      TWITCH_CHAT_MAX_LENGTH: ${TWITCH_CHAT_MAX_LENGTH:-500}
      TWITCH_CHAT_TEMPLATE_VALUE_MAX_LENGTH: ${TWITCH_CHAT_TEMPLATE_VALUE_MAX_LENGTH:-120}
      TWITCH_API_TIMEOUT_MS: ${TWITCH_API_TIMEOUT_MS:-10000}
      BRIDGE_SHARED_SECRET: ${BRIDGE_SHARED_SECRET:-}
      BRIDGE_SHARED_SECRET_FILE: ${BRIDGE_SHARED_SECRET_FILE:-}
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      RIOT_ACCOUNT_REGION: ${RIOT_ACCOUNT_REGION:-asia}
      RIOT_LOL_PLATFORM: ${RIOT_LOL_PLATFORM:-kr}
      RIOT_RATE_LIMIT_ENABLED: ${RIOT_RATE_LIMIT_ENABLED:-true}
      RIOT_RATE_LIMIT_PER_SECOND: ${RIOT_RATE_LIMIT_PER_SECOND:-20}
      RIOT_RATE_LIMIT_PER_TWO_MINUTES: ${RIOT_RATE_LIMIT_PER_TWO_MINUTES:-100}
      RIOT_RATE_LIMIT_QUEUE_MAX: ${RIOT_RATE_LIMIT_QUEUE_MAX:-500}
      RIOT_API_TIMEOUT_MS: ${RIOT_API_TIMEOUT_MS:-10000}
      LOCAL_TTS_ENABLED: ${LOCAL_TTS_ENABLED:-true}
      LOCAL_TTS_PROVIDER: ${LOCAL_TTS_PROVIDER:-seoya}
      LOCAL_TTS_BASE_URL: ${LOCAL_TTS_BASE_URL:-http://tts-engine:8787}
      LOCAL_TTS_SPEAKER: ${LOCAL_TTS_SPEAKER:-3}
      LOCAL_TTS_BROADCAST_WAIT_MS: ${LOCAL_TTS_BROADCAST_WAIT_MS:-15000}
      LOCAL_TTS_TIMEOUT_MS: ${LOCAL_TTS_TIMEOUT_MS:-15000}
      LOCAL_TTS_MAX_TEXT_LENGTH: ${LOCAL_TTS_MAX_TEXT_LENGTH:-300}
      LOCAL_TTS_CACHE_DIR: ${LOCAL_TTS_CACHE_DIR:-/app/.streamops/tts-cache}
      LOCAL_TTS_PUBLIC_PATH: ${LOCAL_TTS_PUBLIC_PATH:-/tts}
      STREAMOPS_LOGS_DIR: /app/logs
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-10485760}
      LOG_MAX_FILES: ${LOG_MAX_FILES:-5}
      STREAMOPS_STATE_DIR: /app/.streamops
      STREAMOPS_REPORTS_DIR: /app/reports
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DASHBOARD_AUTH_TOKEN: ${DASHBOARD_AUTH_TOKEN:-}
      DASHBOARD_AUTH_TOKEN_FILE: ${DASHBOARD_AUTH_TOKEN_FILE:-}
      DASHBOARD_SESSION_TTL_MS: ${DASHBOARD_SESSION_TTL_MS:-28800000}
      OVERLAY_ACCESS_TOKEN: ${OVERLAY_ACCESS_TOKEN:-}
      OVERLAY_ACCESS_TOKEN_FILE: ${OVERLAY_ACCESS_TOKEN_FILE:-}
      SUPPORT_MAILBOX_ENABLED: ${SUPPORT_MAILBOX_ENABLED:-false}
      SUPPORT_MAILBOX_ADDRESS: ${SUPPORT_MAILBOX_ADDRESS:-support@yoro.gg}
      SUPPORT_MAILBOX_WEBHOOK_SECRET: ${SUPPORT_MAILBOX_WEBHOOK_SECRET:-}
      SUPPORT_MAILBOX_WEBHOOK_SECRET_FILE: ${SUPPORT_MAILBOX_WEBHOOK_SECRET_FILE:-}
      SUPPORT_MAILBOX_ENCRYPTION_KEY: ${SUPPORT_MAILBOX_ENCRYPTION_KEY:-}
      SUPPORT_MAILBOX_ENCRYPTION_KEY_FILE: ${SUPPORT_MAILBOX_ENCRYPTION_KEY_FILE:-}
      SUPPORT_MAILBOX_STATE_PATH: ${SUPPORT_MAILBOX_STATE_PATH:-/app/.streamops/support-mailbox.json.enc}
      SUPPORT_MAILBOX_RETENTION_DAYS: ${SUPPORT_MAILBOX_RETENTION_DAYS:-90}
      SUPPORT_MAILBOX_MAX_MESSAGES: ${SUPPORT_MAILBOX_MAX_MESSAGES:-1000}
      LEGAL_OPERATOR_NAME: ${LEGAL_OPERATOR_NAME:-}
      LEGAL_CONTACT_ADDRESS: ${LEGAL_CONTACT_ADDRESS:-}
      LEGAL_PRIVACY_OFFICER_NAME: ${LEGAL_PRIVACY_OFFICER_NAME:-}
      LEGAL_CONTACT_EMAIL: ${LEGAL_CONTACT_EMAIL:-support@yoro.gg}
      LEGAL_CONTACT_PHONE: ${LEGAL_CONTACT_PHONE:-}
      LEGAL_EFFECTIVE_DATE: ${LEGAL_EFFECTIVE_DATE:-}
      LEGAL_MINIMUM_AGE: ${LEGAL_MINIMUM_AGE:-14}
      LEGAL_GOVERNING_LAW_KO: ${LEGAL_GOVERNING_LAW_KO:-}
      LEGAL_GOVERNING_LAW_JA: ${LEGAL_GOVERNING_LAW_JA:-}
      LEGAL_DISPUTE_VENUE_KO: ${LEGAL_DISPUTE_VENUE_KO:-}
      LEGAL_DISPUTE_VENUE_JA: ${LEGAL_DISPUTE_VENUE_JA:-}
      LEGAL_PROCESSORS_KO: ${LEGAL_PROCESSORS_KO:-}
      LEGAL_PROCESSORS_JA: ${LEGAL_PROCESSORS_JA:-}
      LEGAL_CROSS_BORDER_TRANSFER_KO: ${LEGAL_CROSS_BORDER_TRANSFER_KO:-}
      LEGAL_CROSS_BORDER_TRANSFER_JA: ${LEGAL_CROSS_BORDER_TRANSFER_JA:-}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./logs:/app/logs
      - ./apps/server/config:/app/apps/server/config:ro
      - ./reports:/app/reports
      - ./secrets:/run/secrets:ro
      - streamops_state:/app/.streamops
    healthcheck:
      test: ["CMD", "node", "-e", "const port=process.env.PORT||3000; fetch(`http://127.0.0.1:$${port}/health/ready`).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  tts-engine:
    build:
      context: ./apps/tts-engine
      dockerfile: Dockerfile
    container_name: streamops-tts-engine
    restart: unless-stopped
    environment:
      VOICEVOX_BASE_URL: ${VOICEVOX_BASE_URL:-http://voicevox:50021}
      SEOYA_DEFAULT_SPEAKER_ID: ${SEOYA_DEFAULT_SPEAKER_ID:-3}
      SEOYA_SERVER_HOST: 0.0.0.0
      SEOYA_SERVER_PORT: 8787
      SE0YA_DEFAULT_SPEAKER_ID: ${SE0YA_DEFAULT_SPEAKER_ID:-3}
      SE0YA_SERVER_HOST: 0.0.0.0
      SE0YA_SERVER_PORT: 8787
    ports:
      - "${SE0YA_TTS_BIND:-127.0.0.1}:${SE0YA_TTS_HOST_PORT:-8787}:8787"
    volumes:
      - ./apps/tts-engine/config.json:/app/config.json:ro
      - ./apps/tts-engine/templates.json:/app/templates.json:ro
      - ./apps/tts-engine/sfx:/app/sfx:ro
      - streamops_tts_output:/app/output
    depends_on:
      voicevox:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5)"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  voicevox:
    image: ${VOICEVOX_IMAGE:-voicevox/voicevox_engine:cpu-ubuntu20.04-latest}
    container_name: streamops-voicevox
    restart: unless-stopped
    expose:
      - "50021"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: streamops-cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      server:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  streamops_state:
  streamops_tts_output:
