    <script nonce="__STREAMOPS_CSP_NONCE__" src="/dashboard/config.js"></script>
    <script nonce="__STREAMOPS_CSP_NONCE__">
      (() => {
        const consentKey = "yoro.ads.consent";
        const scriptSelector = "script[data-yoro-adsense]";
        const loadAdsense = () => {
          if (document.querySelector(scriptSelector)) return;
          const script = document.createElement("script");
          script.async = true;
          script.crossOrigin = "anonymous";
          script.dataset.yoroAdsense = "true";
          script.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7880271953912430";
          document.head.append(script);
        };

        try {
          if (window.localStorage.getItem(consentKey) === "granted") loadAdsense();
        } catch {
          // 저장소 접근이 차단된 환경에서는 동의 전 상태를 유지합니다.
        }
        window.addEventListener("yoro:ads-consent", (event) => {
          if (event instanceof CustomEvent && event.detail?.granted === true) loadAdsense();
        });
      })();
    </script>
    <title>YORO.gg</title>
  </head>
  <body>
    <div id="root"></div>
    <script nonce="__STREAMOPS_CSP_NONCE__" type="module" src="/src/main.tsx"></script>
  </body>
